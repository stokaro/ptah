services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ptah_test
      POSTGRES_USER: ptah_user
      POSTGRES_PASSWORD: ptah_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptah_user -d ptah_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:9.7
    environment:
      MYSQL_DATABASE: ptah_test
      MYSQL_USER: ptah_user
      MYSQL_PASSWORD: ptah_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ptah_user", "-pptah_password"]
      interval: 5s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ptah_test
      MARIADB_USER: ptah_user
      MARIADB_PASSWORD: ptah_password
      MARIADB_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ptah_user", "-pptah_password"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_DB: ptah_test
      CLICKHOUSE_USER: ptah_user
      CLICKHOUSE_PASSWORD: ptah_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  cockroachdb:
    image: cockroachdb/cockroach:v26.2.4
    command:
      - start-single-node
      - --insecure
      - --advertise-addr=localhost:26257
    ports:
      - "26257:26257"
    volumes:
      - cockroachdb_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "/cockroach/cockroach", "sql", "--insecure", "--host=localhost:26257", "--execute=SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  yugabytedb:
    image: yugabytedb/yugabyte:2026.1.0.0-b118
    command:
      - bash
      - -lc
      - ip=$$(hostname -i); ip=$${ip%% *}; exec bin/yugabyted start --daemon=false --advertise_address=$$ip --ui=false
    ports:
      - "5434:5433"
    healthcheck:
      test: ["CMD-SHELL", "ip=$$(hostname -i); ip=$${ip%% *}; bin/ysqlsh -h $$ip -p 5433 -U yugabyte -d yugabyte -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 18

  # Test runner service
  ptah-tester:
    build:
      context: .
      dockerfile: integration/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      cockroachdb:
        condition: service_healthy
      yugabytedb:
        condition: service_healthy
    environment:
      POSTGRES_URL: "postgres://ptah_user:ptah_password@postgres:5432/ptah_test?sslmode=disable"
      MYSQL_URL: "mysql://ptah_user:ptah_password@tcp(mysql:3306)/ptah_test"
      MARIADB_URL: "mariadb://ptah_user:ptah_password@tcp(mariadb:3306)/ptah_test"
      CLICKHOUSE_URL: "clickhouse://ptah_user:ptah_password@clickhouse:9000/ptah_test"
      COCKROACHDB_URL: "cockroachdb://root@cockroachdb:26257/defaultdb?sslmode=disable"
      YUGABYTEDB_URL: "yugabytedb://yugabyte@yugabytedb:5433/yugabyte?sslmode=disable"
    volumes:
      - ./integration/reports:/app/reports
      - ./integration/fixtures:/app/fixtures
    profiles:
      - test

volumes:
  postgres_data:
  mysql_data:
  mariadb_data:
  clickhouse_data:
  cockroachdb_data:
