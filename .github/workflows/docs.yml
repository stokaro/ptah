name: Docs

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'docs/site/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: false

env:
  MAX_DOC_TAG_VERSIONS: ${{ vars.MAX_DOC_TAG_VERSIONS || 10 }}

jobs:
  changes:
    name: Detect docs changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v7
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - 'docs/site/**'
              - '.github/workflows/docs.yml'

  build:
    name: Build versioned site
    needs: changes
    if: >-
      github.event_name == 'pull_request' ||
      ( github.event_name == 'push' &&
        ( startsWith(github.ref, 'refs/tags/v') ||
          (github.ref == 'refs/heads/master' && needs.changes.outputs.docs == 'true') ) )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/site/package-lock.json

      - name: Self-test the version generator
        run: node docs/site/scripts/gen-versions.mjs --selftest

      - name: Build edge from the current tree
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
        env:
          DOCS_VERSION: edge
          ASTRO_TELEMETRY_DISABLED: "1"
        run: |
          set -euo pipefail
          cd docs/site
          npm ci
          npm run build
          mkdir -p "$GITHUB_WORKSPACE/_site/edge"
          cp -r dist/. "$GITHUB_WORKSPACE/_site/edge/"

      - name: Build edge from master
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DOCS_VERSION: edge
          ASTRO_TELEMETRY_DISABLED: "1"
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          git worktree add --force "$workdir" origin/master
          ( cd "$workdir/docs/site" \
            && DOCS_VERSION=edge ASTRO_TELEMETRY_DISABLED=1 npm ci \
            && DOCS_VERSION=edge ASTRO_TELEMETRY_DISABLED=1 npm run build )
          mkdir -p "$GITHUB_WORKSPACE/_site/edge"
          cp -r "$workdir/docs/site/dist/." "$GITHUB_WORKSPACE/_site/edge/"
          git worktree remove --force "$workdir" || true

      - name: Build each released tag
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          for tag in $(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -V | tail -n "${MAX_DOC_TAG_VERSIONS:-10}" || true); do
            echo "::group::Building $tag"
            workdir="$(mktemp -d)"
            git worktree add --force "$workdir" "refs/tags/$tag"
            if [ -f "$workdir/docs/site/package.json" ]; then
              if ( cd "$workdir/docs/site" \
                   && DOCS_VERSION="$tag" ASTRO_TELEMETRY_DISABLED=1 npm ci \
                   && DOCS_VERSION="$tag" ASTRO_TELEMETRY_DISABLED=1 npm run build ); then
                mkdir -p "$GITHUB_WORKSPACE/_site/$tag"
                cp -r "$workdir/docs/site/dist/." "$GITHUB_WORKSPACE/_site/$tag/"
              else
                echo "::warning::$tag failed to build; skipping this historical version"
              fi
            else
              echo "::warning::$tag has no docs/site; skipping"
            fi
            git worktree remove --force "$workdir" || true
            echo "::endgroup::"
          done

      - name: Generate root version index and redirect
        if: github.event_name == 'push'
        run: node docs/site/scripts/gen-versions.mjs "$GITHUB_WORKSPACE/_site"

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: [changes, build]
    if: >-
      github.event_name == 'push' &&
      ( startsWith(github.ref, 'refs/tags/v') ||
        (github.ref == 'refs/heads/master' && needs.changes.outputs.docs == 'true') )
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
