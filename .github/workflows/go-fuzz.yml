name: Go Fuzz

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: go mod download

      - name: Verify fuzz targets
        run: |
          go test -list '^Fuzz' ./core/lexer | grep '^FuzzLexer$'
          go test -list '^Fuzz' ./core/parser | grep '^FuzzParseSQL$'

      - name: Select fuzz duration
        id: fuzz-duration
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "fuzztime=10m" >> "$GITHUB_OUTPUT"
          else
            echo "fuzztime=30s" >> "$GITHUB_OUTPUT"
          fi

      - name: Fuzz lexer
        run: go test -run '^$' -fuzz=FuzzLexer -fuzztime=${{ steps.fuzz-duration.outputs.fuzztime }} -timeout=15m ./core/lexer

      - name: Fuzz parser
        run: go test -run '^$' -fuzz=FuzzParseSQL -fuzztime=${{ steps.fuzz-duration.outputs.fuzztime }} -timeout=15m ./core/parser
