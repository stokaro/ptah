name: Integration Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ptah_test
          POSTGRES_USER: ptah_user
          POSTGRES_PASSWORD: ptah_password
        options: >-
          --health-cmd "pg_isready -U ptah_user -d ptah_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: mysql:9.7
        env:
          MYSQL_DATABASE: ptah_test
          MYSQL_USER: ptah_user
          MYSQL_PASSWORD: ptah_password
          MYSQL_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u ptah_user -pptah_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=1024m
        ports:
          - 3306:3306

      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: ptah_test
          MARIADB_USER: ptah_user
          MARIADB_PASSWORD: ptah_password
          MARIADB_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u ptah_user -pptah_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=1024m
        ports:
          - 3307:3306

      clickhouse:
        image: clickhouse/clickhouse-server:24
        env:
          CLICKHOUSE_DB: ptah_test
          CLICKHOUSE_USER: ptah_user
          CLICKHOUSE_PASSWORD: ptah_password
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 8123:8123
          - 9000:9000

    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
          cache-dependency-path: go.sum
      
      - name: Install dependencies
        run: go mod download

      - name: Start distributed SQL databases
        run: |
          docker run --detach --name ptah-cockroachdb \
            --publish 26257:26257 \
            cockroachdb/cockroach:v26.2.4 \
            start-single-node --insecure --advertise-addr=localhost:26257

          docker run --detach --name ptah-yugabytedb \
            --publish 5433:5433 \
            yugabytedb/yugabyte:2026.1.0.0-b118 \
            bash -lc 'ip=$(hostname -i); ip=${ip%% *}; exec bin/yugabyted start --daemon=false --advertise_address=$ip --ui=false'

      - name: Wait for databases to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U ptah_user; do
            echo "PostgreSQL is unavailable - sleeping"
            sleep 2
          done
          echo "PostgreSQL is ready!"
          
          echo "Waiting for MySQL..."
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u ptah_user -pptah_password --silent; do
            echo "MySQL is unavailable - sleeping"
            sleep 2
          done
          echo "MySQL is ready!"
          
          echo "Waiting for MariaDB..."
          until mysqladmin ping -h 127.0.0.1 -P 3307 -u ptah_user -pptah_password --silent; do
            echo "MariaDB is unavailable - sleeping"
            sleep 2
          done
          echo "MariaDB is ready!"

          echo "Waiting for ClickHouse..."
          until curl --silent --fail http://127.0.0.1:8123/ping; do
            echo "ClickHouse is unavailable - sleeping"
            sleep 2
          done
          echo "ClickHouse is ready!"

          echo "Waiting for CockroachDB..."
          until docker exec ptah-cockroachdb /cockroach/cockroach sql --insecure --host=127.0.0.1:26257 --execute="SELECT 1"; do
            echo "CockroachDB is unavailable - sleeping"
            sleep 2
          done
          echo "CockroachDB is ready!"

          echo "Waiting for YugabyteDB..."
          until docker exec ptah-yugabytedb bash -lc 'ip=$(hostname -i); ip=${ip%% *}; bin/ysqlsh -h "$ip" -p 5433 -U yugabyte -d yugabyte -c "SELECT 1"'; do
            echo "YugabyteDB is unavailable - sleeping"
            sleep 5
          done
          echo "YugabyteDB is ready!"
      
      - name: Run executor integration tests with live databases
        env:
          POSTGRES_TEST_DSN: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_TEST_DSN: "ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          MARIADB_TEST_DSN: "ptah_user:ptah_password@tcp(127.0.0.1:3307)/ptah_test"
          POSTGRES_TEST_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_TEST_URL: "mysql://ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          POSTGRES_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_URL: "mysql://ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          MARIADB_URL: "mariadb://ptah_user:ptah_password@tcp(127.0.0.1:3307)/ptah_test"
        run: |
          go test -v ./integration -tags=integration -timeout 15m
          go test -v ./integration/gonative -tags=integration -timeout 15m

      - name: Build integration test binary
        run: |
          go build -race -o ./integration-test ./cmd/integration-test

      - name: Test integration binary help
        run: |
          ./integration-test --help

      - name: Run basic smoke test
        env:
          POSTGRES_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
        run: |
          ./integration-test --scenarios=apply_incremental_migrations,check_current_version --databases=postgres --report=stdout,txt,json,html --output=./reports

      - name: Run migrator safety integration tests
        env:
          POSTGRES_TEST_DSN: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_TEST_URL: "mysql://ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          MARIADB_TEST_URL: "mariadb://ptah_user:ptah_password@tcp(127.0.0.1:3307)/ptah_test"
        run: |
          go test -v ./migration/migrator -run 'TestMigrateUp_PostgresLockTimeoutIntegration|TestOutOfOrderMigrationsPostgresIntegration|TestMigrationAdvisoryLock_PostgresConcurrentRunners|TestMigrationAdvisoryLock_PostgresTimeoutIntegration|TestMigrationAdvisoryLock_MySQLDefaultTimeoutIntegration|TestMigrationAdvisoryLock_MariaDBDefaultTimeoutIntegration|TestDirtyMigrationState_PostgresFailureRollsBackAndBlocksRetry|TestDirtyMigrationState_MySQLRepairReachesHead|TestDirtyMigrationState_MariaDBRepairReachesHead|TestMigrationChecksumMismatch_PostgresIntegration|TestBaseline_' -timeout 3m

      - name: Run no-transaction and shadow generator integration tests
        env:
          POSTGRES_TEST_DSN: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          POSTGRES_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
        run: |
          go test -v ./migration/migrator -run 'TestNoTransactionDirective_PostgresEnumValueCanBeUsedInSameMigration' -timeout 3m
          go test -v ./migration/generator -run 'TestGenerateMigrationShadowVerificationWithRealDB|TestGenerateMigrationConcurrentIndexOnPopulatedPostgresTableWithRealDB' -timeout 5m
          go test -v ./cmd/migrateup -run 'TestMigrateUpCommandHonorsLintConfigSeverityWithPostgres' -timeout 3m

      - name: Run migrate-baseline integration tests
        env:
          POSTGRES_TEST_DSN: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
        run: |
          go test -v ./cmd/migratebaseline -run 'TestVerifyBaselineShadowPostgres|TestMigrateBaselineCommandPostgresWritesMetadataWithoutExecutingDDL' -timeout 3m

      - name: Run all databases comprehensive test
        env:
          POSTGRES_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_URL: "mysql://ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          MARIADB_URL: "mariadb://ptah_user:ptah_password@tcp(127.0.0.1:3307)/ptah_test"
          CLICKHOUSE_URL: "clickhouse://ptah_user:ptah_password@localhost:9000/ptah_test"
          COCKROACHDB_URL: "cockroachdb://root@localhost:26257/defaultdb?sslmode=disable"
          YUGABYTEDB_URL: "yugabytedb://yugabyte@localhost:5433/yugabyte?sslmode=disable"
        run: |
          ./integration-test --databases=postgres,mysql,mariadb,clickhouse,cockroachdb,yugabytedb --report=stdout,txt,json,html --verbose --output=./reports

      - name: Run distributed SQL live smoke tests
        env:
          COCKROACHDB_URL: "cockroachdb://root@localhost:26257/defaultdb?sslmode=disable"
          YUGABYTEDB_URL: "yugabytedb://yugabyte@localhost:5433/yugabyte?sslmode=disable"
        run: |
          ./integration-test --databases=cockroachdb --scenarios=dynamic_cockroachdb_common_subset --report=stdout,txt,json,html --verbose --output=./reports
          ./integration-test --databases=yugabytedb --scenarios=dynamic_yugabytedb_common_subset --report=stdout,txt,json,html --verbose --output=./reports

      - name: Upload integration test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ptah-integration-test-reports
          path: |
            reports/
          retention-days: 7
      
      - name: Run dynamic integration tests
        env:
          POSTGRES_TEST_DSN: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_TEST_DSN: "ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          MARIADB_TEST_DSN: "ptah_user:ptah_password@tcp(127.0.0.1:3307)/ptah_test"
          POSTGRES_TEST_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_TEST_URL: "mysql://ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          POSTGRES_URL: "postgres://ptah_user:ptah_password@localhost:5432/ptah_test?sslmode=disable"
          MYSQL_URL: "mysql://ptah_user:ptah_password@tcp(127.0.0.1:3306)/ptah_test"
          MARIADB_URL: "mariadb://ptah_user:ptah_password@tcp(127.0.0.1:3307)/ptah_test"
          CLICKHOUSE_URL: "clickhouse://ptah_user:ptah_password@localhost:9000/ptah_test"
          COCKROACHDB_URL: "cockroachdb://root@localhost:26257/defaultdb?sslmode=disable"
          YUGABYTEDB_URL: "yugabytedb://yugabyte@localhost:5433/yugabyte?sslmode=disable"
        run: |
          go test -v -race ./integration -tags=integration -timeout 30m
