name: Go Lint

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  go-lint:
    name: ptah-go-lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
          cache-dependency-path: go.sum
      
      - name: Install dependencies
        run: go mod download

      - name: Check documentation safety claims
        run: |
          ! grep -F "All operations are wrapped in transactions" README.md
          ! grep -F "All operations wrapped in transactions" README.md
          ! grep -F "locking prevents double-apply" README.md

      - name: Check public Go API ledger
        run: scripts/check-public-api.sh

      - name: Check public Go API snapshot
        run: scripts/check-public-api-snapshot.sh

      - name: qtlint
        run: go tool qtlint ./...

      - name: Golint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=30m
          version: v2.12.2
