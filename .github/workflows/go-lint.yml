name: Go Lint

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  go-lint:
    name: ptah-go-lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
          cache-dependency-path: go.sum
      
      - name: Install dependencies
        run: go mod download

      - name: Check documentation safety claims
        run: |
          ! grep -F "All operations are wrapped in transactions" README.md
          ! grep -F "All operations wrapped in transactions" README.md
          ! grep -F "locking prevents double-apply" README.md

      - name: Check public Go API ledger
        run: scripts/check-public-api.sh

      - name: Check public Go API snapshot
        run: scripts/check-public-api-snapshot.sh

      - name: qtlint
        run: go tool qtlint ./...

      - name: Validate lint SARIF output
        run: go test ./cmd/lint -run 'TestRunLint_SARIF' -count=1

      - name: Generate lint SARIF for code scanning
        run: go run ./cmd/ptah migrations lint --dir cmd/lint/testdata/clean --format sarif --fail-on none > ptah-lint.sarif

      - name: Upload lint SARIF to code scanning
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ptah-lint.sarif
          category: ptah-lint

      - name: Golint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=30m
          version: v2.12.2
