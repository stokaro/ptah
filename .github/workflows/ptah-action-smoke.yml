name: Ptah Action Smoke

on:
  pull_request:
    paths:
      - ".github/actions/ptah/**"
      - ".github/workflows/ptah-action-smoke.yml"
      - "cmd/**"
      - "core/**"
      - "dbschema/**"
      - "internal/**"
      - "migration/**"
      - "go.mod"
      - "go.sum"
  push:
    branches:
      - master
    paths:
      - ".github/actions/ptah/**"
      - ".github/workflows/ptah-action-smoke.yml"
      - "cmd/**"
      - "core/**"
      - "dbschema/**"
      - "internal/**"
      - "migration/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: go.sum

      - name: Build Ptah
        run: go build -o "$RUNNER_TEMP/ptah" ./cmd/ptah

      - name: Create smoke schema source
        run: |
          mkdir -p "$RUNNER_TEMP/ptah-action-models"
          cat > "$RUNNER_TEMP/ptah-action-models/models.go" <<'GO'
          package models

          //migrator:schema:table name="users"
          type User struct {
              //migrator:schema:field name="id" type="INTEGER" primary="true"
              ID int

              //migrator:schema:field name="email" type="TEXT" not_null="true" unique="true"
              Email string
          }
          GO

      - name: Run local Ptah action
        uses: ./.github/actions/ptah
        with:
          binary-path: ${{ runner.temp }}/ptah
          setup-go: "false"
          dir: ${{ runner.temp }}/ptah-action-models
          db-url: sqlite:///${{ runner.temp }}/ptah-action.db
          dialect: sqlite
          migration-dir: cmd/lint/testdata/clean
          comment: "false"
          lint: "true"
